const fmtClass = {Reels:'badge-reels',Carrusel:'badge-carrusel',Stories:'badge-stories','En Vivo':'badge-enlivo'};

function render(list){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('counter').textContent = list.length;
  list.forEach((idea,i)=>{
    const realIdx = ideas.indexOf(idea);
    const card = document.createElement('div');
    card.className = 'idea-card';
    card.innerHTML = `
      <div class="idea-header">
        <span class="idea-num">#${String(realIdx+1).padStart(2,'0')}</span>
        <span class="idea-title">${idea.titulo} <span class="arrow">›</span></span>
      </div>
      <div class="badges"><span class="badge ${fmtClass[idea.formato]}">${idea.formato}</span></div>
      <div class="idea-body">
        <div><div class="field-label">Ángulo</div><div class="field-value angulo">${idea.angulo}</div></div>
        <div><div class="field-label">Promesa</div><div class="field-value promesa">${idea.promesa}</div></div>
        <div><div class="field-label">Gatillo de compartido</div><div class="field-value">${idea.gatillo}</div></div>
        <div><div class="field-label">Llamado a la acción</div><div class="cta-chip">↗ ${idea.cta}</div></div>
      </div>`;
    card.addEventListener('click',()=>card.classList.toggle('expanded'));
    grid.appendChild(card);
  });
}

function filter(fmt, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(fmt==='todos' ? ideas : ideas.filter(i=>i.formato===fmt));
}

render(ideas);
</script>
